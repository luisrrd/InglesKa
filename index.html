<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>English Tenses Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#F7F5F0;--surface:#FFFFFF;--surface2:#F0EDE6;
    --text:#1A1814;--text2:#6B6558;--text3:#9E9891;
    --blue:#1B4F8A;--blue-light:#E8F0FB;--blue-mid:#3A7BD5;
    --green:#2D6A4F;--green-light:#D8F3DC;
    --red:#9B2226;--red-light:#FFE8E8;
    --gold:#B5881C;--gold-light:#FEF7E0;
    --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
    --radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-family:'Lora',serif;font-size:18px;font-weight:600;}
  .logo span{color:var(--blue-mid);}
  .score-pills{display:flex;gap:8px;}
  .pill{padding:4px 14px;border-radius:99px;font-size:13px;font-weight:500;border:1px solid var(--border2);background:var(--surface);}
  .pill.correct{background:var(--green-light);color:var(--green);border-color:#74C69D;}
  .pill.wrong{background:var(--red-light);color:var(--red);border-color:#F4A7A9;}
  .pill.pct{background:var(--gold-light);color:var(--gold);border-color:#F0C040;}

  .main{max-width:720px;margin:0 auto;padding:2.5rem 1.5rem 4rem;}
  .group-wrap{display:flex;flex-direction:column;gap:1.25rem;margin-bottom:1.75rem;}
  .group-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;padding-left:2px;}
  .tense-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
  .tense-btn{padding:10px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:left;line-height:1.4;}
  .tense-btn:hover{background:var(--surface2);}
  .tense-btn.active{background:var(--blue-light);border:2px solid var(--blue-mid);color:var(--blue);}
  .tense-btn .tn{display:block;font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text3);margin-bottom:2px;}
  .tense-btn.active .tn{color:var(--blue-mid);}

  .random-btn{padding:9px 16px;border:1.5px dashed var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;width:100%;margin-bottom:1.5rem;}
  .random-btn:hover{background:var(--surface2);}

  .progress-bar{height:3px;background:var(--border);border-radius:99px;margin-bottom:1.5rem;overflow:hidden;}
  .progress-fill{height:100%;background:var(--blue-mid);border-radius:99px;transition:width .4s ease;}

  .quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;margin-bottom:1rem;}
  .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
  .tense-badge{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);background:var(--blue-light);border-radius:99px;padding:4px 12px;}
  .q-counter{font-size:13px;color:var(--text3);}
  .structure-box{font-family:'Courier New',monospace;font-size:12px;color:var(--text2);background:var(--surface2);border-radius:var(--radius-sm);padding:7px 12px;margin-bottom:1.25rem;}
  .question-text{font-family:'Lora',serif;font-size:19px;color:var(--text);line-height:1.65;margin-bottom:.5rem;}
  .blank-word{display:inline-block;min-width:90px;border-bottom:2.5px solid var(--blue-mid);padding:0 6px;color:transparent;vertical-align:bottom;}
  .hint{font-size:13px;color:var(--text3);margin-bottom:1.25rem;font-style:italic;}

  .input-row{display:flex;gap:8px;}
  .ans-input{flex:1;padding:10px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:border .15s,box-shadow .15s;}
  .ans-input:focus{outline:none;border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(58,123,213,.15);}
  .ans-input:disabled{opacity:.6;}
  .check-btn{padding:10px 22px;border:none;border-radius:var(--radius-sm);background:var(--blue);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s,transform .1s;}
  .check-btn:hover{background:var(--blue-mid);}
  .check-btn:active{transform:scale(.97);}
  .check-btn:disabled{opacity:.4;cursor:default;}

  .feedback{margin-top:14px;padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;line-height:1.65;animation:fadeIn .2s ease;}
  .feedback.correct{background:var(--green-light);color:var(--green);border:1px solid #74C69D;}
  .feedback.wrong{background:var(--red-light);color:var(--red);border:1px solid #F4A7A9;}
  .correct-ans{font-weight:600;font-family:'Lora',serif;}
  .expl{margin-top:6px;font-size:13px;opacity:.85;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  .next-btn{width:100%;padding:11px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;display:none;}
  .next-btn:hover{background:var(--surface2);}

  .start-hint{text-align:center;padding:3rem 0;color:var(--text3);font-size:15px;}
  .start-hint .arrow{font-size:24px;display:block;margin-bottom:8px;}

  @media(max-width:520px){
    .topbar{padding:0 1rem;}
    .score-pills .pill:last-child{display:none;}
    .main{padding:1.5rem 1rem 4rem;}
    .tense-grid{grid-template-columns:1fr 1fr;}
    .question-text{font-size:16px;}
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">English<span>Tenses</span></div>
  <div class="score-pills">
    <div class="pill correct" id="s-correct">✓ 0</div>
    <div class="pill wrong" id="s-wrong">✗ 0</div>
    <div class="pill pct" id="s-pct">— %</div>
  </div>
</div>

<div class="main">
  <div class="group-wrap" id="groups"></div>
  <button class="random-btn" onclick="randomTense()">🎲 Random tense</button>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div id="quiz-area"><div class="start-hint"><span class="arrow">☝️</span>Pick a tense above to start practicing</div></div>
</div>

<script>
const GROUPS=[
  {label:"Present tenses",tenses:[
    {id:"sp",  label:"Present Simple",            structure:"Subject + V1  (he/she/it → V1+s/es)"},
    {id:"pc",  label:"Present Continuous",        structure:"Subject + am/is/are + V-ing"},
    {id:"pp",  label:"Present Perfect",           structure:"Subject + have/has + V3"},
    {id:"ppc", label:"Present Perfect Continuous",structure:"Subject + have/has been + V-ing"},
  ]},
  {label:"Past tenses",tenses:[
    {id:"past",label:"Past Simple",               structure:"Subject + V2  (regular → V+ed)"},
    {id:"pac", label:"Past Continuous",           structure:"Subject + was/were + V-ing"},
    {id:"pap", label:"Past Perfect",              structure:"Subject + had + V3"},
    {id:"papc",label:"Past Perfect Continuous",   structure:"Subject + had been + V-ing"},
  ]},
  {label:"Future tenses",tenses:[
    {id:"fw",  label:"Future Simple (will)",      structure:"Subject + will + V1"},
    {id:"fg",  label:"Going to (future)",         structure:"Subject + am/is/are + going to + V1"},
    {id:"fc",  label:"Future Continuous",         structure:"Subject + will be + V-ing"},
    {id:"fp",  label:"Future Perfect",            structure:"Subject + will have + V3"},
  ]},
];

const Q={
  sp:[
    {s:"The sun ___ in the east every morning.",a:"rises",hint:"A universal natural fact",expl:"Simple present for facts/truths. Third person singular: rise → rises."},
    {s:"She ___ coffee before going to work.",a:"drinks",hint:"A daily morning routine",expl:"Habitual action. Third person singular: drink → drinks."},
    {s:"My brother ___ at a hospital.",a:"works",hint:"His current occupation",expl:"Simple present for permanent situations. Third person singular: work → works."},
    {s:"Dogs ___ a lot in hot weather.",a:"pant",hint:"What dogs do when it's hot",expl:"Plural subject takes base form — no -s added."},
    {s:"Water ___ at 100 degrees Celsius.",a:"boils",hint:"A scientific fact",expl:"Scientific facts use simple present. Third person singular: boil → boils."},
    {s:"He rarely ___ his homework on time.",a:"finishes",hint:"A bad habit",expl:"'Rarely' signals habit. Third person singular: finish → finishes."},
    {s:"The train ___ at 7:45 every morning.",a:"leaves",hint:"A fixed timetable",expl:"Timetabled events use simple present. Third person singular: leave → leaves."},
    {s:"They ___ French at their school.",a:"teach",hint:"What those teachers do",expl:"Plural subject takes base form — no -s."},
    {s:"My cat ___ all day long.",a:"sleeps",hint:"A very lazy pet",expl:"Habitual action. Third person singular: sleep → sleeps."},
    {s:"She always ___ before bed.",a:"reads",hint:"A bedtime habit",expl:"Simple present for routine habits. Third person singular: read → reads."},
  ],
  pc:[
    {s:"Listen! The birds ___ outside.",a:"are singing",hint:"You can hear them right now",expl:"Action happening at this exact moment. are + singing."},
    {s:"I ___ for my final exams this week.",a:"am studying",hint:"Something happening around now",expl:"Present continuous for actions in progress around the present period."},
    {s:"She can't talk — she ___ a shower.",a:"is taking",hint:"She's busy at this moment",expl:"Action in progress at the moment of speaking. is + taking."},
    {s:"They ___ a new restaurant downtown.",a:"are opening",hint:"A current project",expl:"Present continuous for current projects or changing situations."},
    {s:"He ___ better since he started therapy.",a:"is getting",hint:"A positive trend lately",expl:"Present continuous for a developing/changing situation."},
    {s:"We ___ for the bus right now.",a:"are waiting",hint:"Currently at the bus stop",expl:"Ongoing action at the moment of speaking. are + waiting."},
    {s:"The kids ___ a lot of noise upstairs!",a:"are making",hint:"You can hear it right now",expl:"Action in progress at this moment. are + making."},
    {s:"My sister ___ in Australia for a year.",a:"is living",hint:"A temporary situation",expl:"Present continuous for temporary situations. is + living."},
    {s:"The price of food ___ every month.",a:"is rising",hint:"An ongoing economic trend",expl:"Present continuous for an ongoing change or trend."},
    {s:"He ___ a book about space exploration.",a:"is writing",hint:"His current personal project",expl:"An activity in progress over a period of time. is + writing."},
  ],
  pp:[
    {s:"I ___ this movie three times already.",a:"have seen",hint:"Life experience — how many times?",expl:"Present perfect for experiences up to now. have + seen."},
    {s:"She ___ her keys somewhere.",a:"has lost",hint:"She can't find them — present consequence",expl:"Past action with present consequence. has + lost."},
    {s:"They ___ to Japan twice.",a:"have been",hint:"Travel experience in their life",expl:"Present perfect for life experiences. have + been."},
    {s:"He ___ yet. The meeting is still going.",a:"hasn't finished",hint:"Still not done",expl:"Negative present perfect with 'yet' for incomplete actions. hasn't + finished."},
    {s:"We ___ this problem before.",a:"have never encountered",hint:"Completely new situation",expl:"Present perfect with 'never' for zero experience. have + never + past participle."},
    {s:"The government ___ new laws this year.",a:"has introduced",hint:"Recent action in an unfinished period",expl:"'This year' is unfinished, so present perfect is used. has + introduced."},
    {s:"I ___ my report, so I can relax now.",a:"have finished",hint:"Done, with a present result",expl:"Past action with current relevance. have + finished."},
    {s:"The company ___ its headquarters recently.",a:"has moved",hint:"A recent change",expl:"'Recently' signals present perfect. has + moved."},
    {s:"You ___ so much since we last met!",a:"have changed",hint:"Noticing a difference up to now",expl:"Present perfect for change up to the present moment. have + changed."},
    {s:"She ___ already ___ breakfast.",a:"has / eaten",hint:"She's not hungry — it's done",expl:"'Already' with present perfect. has + eaten (irregular past participle)."},
  ],
  ppc:[
    {s:"She is tired because she ___ for two hours.",a:"has been running",hint:"Recent activity with a present result",expl:"Present perfect continuous for recent sustained activity. has been + running."},
    {s:"I ___ this novel for weeks and I love it.",a:"have been reading",hint:"Ongoing activity started in the past",expl:"Action started in the past and continues to now. have been + reading."},
    {s:"They ___ together since college.",a:"have been dating",hint:"A relationship that started in the past",expl:"'Since' signals a start point. have been + dating emphasizes ongoing duration."},
    {s:"He ___ hard all month to get that promotion.",a:"has been working",hint:"Sustained effort with a present result",expl:"Stresses duration and current relevance. has been + working."},
    {s:"It ___ for three days straight.",a:"has been raining",hint:"Non-stop rain, still cloudy outside",expl:"Continuous rain from the past up to now. has been + raining."},
    {s:"We ___ this issue all morning.",a:"have been discussing",hint:"An ongoing meeting or conversation",expl:"Duration of an activity up to now. have been + discussing."},
    {s:"My eyes hurt because I ___ all night.",a:"have been studying",hint:"Cause of a current physical condition",expl:"Present perfect continuous explains a current condition. have been + studying."},
    {s:"The kids ___ video games for hours!",a:"have been playing",hint:"Parent noticing the length of play",expl:"Activity ongoing for a long time. have been + playing."},
    {s:"She ___ for a job since January.",a:"has been looking",hint:"Still searching, not yet hired",expl:"Search started in the past and is still ongoing. has been + looking."},
    {s:"How long ___ you ___ to learn Spanish?",a:"have / been trying",hint:"Asking about the duration of an effort",expl:"Question form: How long + have/has + subject + been + V-ing?"},
  ],
  past:[
    {s:"She ___ her keys yesterday.",a:"lost",hint:"It happened yesterday",expl:"Simple past for a completed action at a specific past time. lose → lost (irregular)."},
    {s:"We ___ dinner at 8 o'clock last night.",a:"had",hint:"A specific time last night",expl:"'Last night' signals simple past. have → had (irregular)."},
    {s:"He ___ his bike to school every day as a child.",a:"rode",hint:"A past habit — no longer true",expl:"Simple past for past habits. ride → rode (irregular)."},
    {s:"They ___ hard for the test and passed easily.",a:"studied",hint:"Completed action before the test",expl:"Completed past action. study → studied (consonant+y → ied)."},
    {s:"I ___ a great movie last Saturday.",a:"watched",hint:"A specific past event",expl:"Completed past action. watch → watched (regular)."},
    {s:"The plane ___ at 6 am this morning.",a:"landed",hint:"A scheduled past event",expl:"Completed event at a past time. land → landed (regular)."},
    {s:"He ___ a pizza and watched football.",a:"ordered",hint:"Two past events in sequence",expl:"Simple past for sequential completed actions. order → ordered."},
    {s:"We ___ on vacation to Costa Rica last summer.",a:"went",hint:"A specific past trip",expl:"Simple past. go → went (irregular)."},
    {s:"She ___ the door and walked in.",a:"opened",hint:"A sequence of past actions",expl:"Completed past action. open → opened (regular)."},
    {s:"The cat ___ on the sofa all afternoon.",a:"slept",hint:"What the cat did all afternoon",expl:"Simple past. sleep → slept (irregular)."},
  ],
  pac:[
    {s:"While I ___ a shower, the phone rang.",a:"was taking",hint:"The shower was interrupted",expl:"Past continuous shows a longer action interrupted by a shorter one. was + taking."},
    {s:"They ___ football when it started to rain.",a:"were playing",hint:"Rain interrupted the game",expl:"Ongoing past action interrupted by a sudden event. were + playing."},
    {s:"She ___ all morning, so she didn't hear us.",a:"was sleeping",hint:"A long background action in the past",expl:"Past continuous for an ongoing background action. was + sleeping."},
    {s:"What ___ you ___ at 9 pm last night?",a:"were / doing",hint:"Asking about an activity in progress",expl:"Question in past continuous: What + were + subject + V-ing?"},
    {s:"I ___ to music when my friend called.",a:"was listening",hint:"The call interrupted the activity",expl:"Past continuous for the action in progress when something else happened."},
    {s:"While she ___ the report, her computer crashed.",a:"was writing",hint:"The crash happened during the writing",expl:"was + writing describes the longer background action."},
    {s:"At 3 am, the neighbours ___ loudly.",a:"were arguing",hint:"Ongoing noisy activity at a specific past time",expl:"Past continuous for an action in progress at a specific past moment."},
    {s:"He ___ when I arrived, so I waited.",a:"was working",hint:"His work was already in progress when you arrived",expl:"Background action in progress when another event occurred. was + working."},
    {s:"The children ___ when the power went out.",a:"were sleeping",hint:"The power cut happened during sleep",expl:"Past continuous for an ongoing action that was interrupted. were + sleeping."},
    {s:"We ___ dinner when we heard the news.",a:"were having",hint:"The news arrived during the meal",expl:"were + having shows the meal was in progress when the news came."},
  ],
  pap:[
    {s:"By the time she arrived, everyone ___.",a:"had left",hint:"They left before she arrived",expl:"Past perfect for an action completed before another past event. had + left."},
    {s:"He was happy because he ___ his exam.",a:"had passed",hint:"Passing happened before the happiness",expl:"Past perfect shows the earlier of two past events. had + passed."},
    {s:"I ___ that movie before, so I knew the ending.",a:"had seen",hint:"A past experience before a past moment",expl:"'Before' signals the earlier action. had + seen."},
    {s:"They ___ dinner before the guests arrived.",a:"had cooked",hint:"Cooking was done before guests came",expl:"Past perfect for completion before another past moment. had + cooked."},
    {s:"She realized she ___ her wallet at home.",a:"had left",hint:"Discovered later that something was forgotten",expl:"Past perfect for a past action before the moment of realization. had + left."},
    {s:"When I got to the cinema, the film already ___.",a:"had started",hint:"Too late — it had already begun",expl:"'Already' with past perfect signals completion before a past reference point. had + started."},
    {s:"He ___ English before moving to London.",a:"had studied",hint:"Study came before the move",expl:"The studying happened before the move. had + studied."},
    {s:"We couldn't enter because we ___ our tickets.",a:"hadn't brought",hint:"Forgot something important",expl:"Negative past perfect for something not done before a past point. hadn't + brought."},
    {s:"By 2020, she ___ three novels.",a:"had written",hint:"Completed before a specific past year",expl:"'By 2020' marks a past deadline. had + written shows completion before it."},
    {s:"The patient ___ three surgeries before recovering.",a:"had undergone",hint:"Multiple events before recovery",expl:"Past perfect for multiple events before another past moment. had + undergone."},
  ],
  papc:[
    {s:"She was tired because she ___ all day.",a:"had been working",hint:"Long effort before the tiredness",expl:"Past perfect continuous stresses duration before a past result. had been + working."},
    {s:"By the time the rain stopped, we ___ for two hours.",a:"had been waiting",hint:"Long wait before a past event",expl:"had been + waiting shows duration of the wait before the rain stopped."},
    {s:"He ___ to get that role for years before he succeeded.",a:"had been trying",hint:"Long effort before success",expl:"Past perfect continuous for sustained effort before a past moment. had been + trying."},
    {s:"The kids ___ all afternoon, that's why they were so tired.",a:"had been playing",hint:"Long activity caused past tiredness",expl:"Duration of activity explains a past result. had been + playing."},
    {s:"She smelled of paint because she ___ the house.",a:"had been painting",hint:"The smell was evidence of the activity",expl:"Past perfect continuous for a recent sustained activity with a visible past result."},
    {s:"How long ___ they ___ before they broke up?",a:"had / been dating",hint:"Asking about the duration of a past relationship",expl:"Question form: How long + had + subject + been + V-ing?"},
    {s:"I was exhausted because I ___ all night.",a:"had been studying",hint:"All-night effort before morning",expl:"Past perfect continuous for the cause of a past condition. had been + studying."},
    {s:"They ___ for hours when they finally found the solution.",a:"had been discussing",hint:"Long discussion before the breakthrough",expl:"Duration of past discussion before a past moment. had been + discussing."},
    {s:"The ground was wet because it ___ heavily.",a:"had been raining",hint:"Rain before a past observation",expl:"Past perfect continuous for the cause of a past observable result."},
    {s:"She ___ for the company for 20 years when she retired.",a:"had been working",hint:"Long career before retirement",expl:"had been + working emphasizes duration of service before the past event of retirement."},
  ],
  fw:[
    {s:"I'm sure he ___ the test. He studied hard.",a:"will pass",hint:"A confident prediction",expl:"'Will' expresses predictions or confident beliefs about the future. will + V1."},
    {s:"Don't worry, I ___ you move the furniture.",a:"will help",hint:"A spontaneous offer made right now",expl:"'Will' for spontaneous decisions or offers at the moment of speaking. will + help."},
    {s:"She ___ 30 next month.",a:"will be",hint:"A future fact",expl:"'Will' for facts about the future. will + be."},
    {s:"If it rains tomorrow, we ___ inside.",a:"will stay",hint:"A conditional future result",expl:"In first conditional, the result clause uses will + V1."},
    {s:"I think technology ___ our lives dramatically.",a:"will change",hint:"A general future prediction",expl:"'Will' for predictions based on opinion. will + change."},
    {s:"He ___ the project by Friday, I'm certain.",a:"will finish",hint:"A confident prediction about a deadline",expl:"'Will' expresses certainty about a future event. will + finish."},
    {s:"Don't call her now — she ___ busy.",a:"will be",hint:"A prediction about her state right now",expl:"'Will' for predictions or assumptions. will + be."},
    {s:"I promise I ___ you soon.",a:"will call",hint:"A promise made right now",expl:"'Will' for promises. will + call."},
    {s:"Scientists believe the climate ___ warmer.",a:"will get",hint:"A scientific future prediction",expl:"'Will' for predictions based on evidence or belief. will + get."},
    {s:"___ you please close the window?",a:"Will",hint:"A polite request",expl:"'Will' in questions can be a polite request. Will + subject + V1?"},
  ],
  fg:[
    {s:"Watch out! That ladder ___ fall!",a:"is going to",hint:"You can see it's about to happen",expl:"'Going to' for imminent events with present evidence. is/am/are + going to + V1."},
    {s:"She has already bought tickets — she ___ Paris next week.",a:"is going to visit",hint:"A pre-planned trip",expl:"'Going to' for plans and intentions already decided. is going to + visit."},
    {s:"I ___ start going to the gym next month.",a:"am going to",hint:"A personal intention or plan",expl:"'Going to' for personal intentions. am going to + V1."},
    {s:"Look at those clouds — it ___ rain.",a:"is going to",hint:"Clear visual evidence right now",expl:"'Going to' when there is present evidence of a future event."},
    {s:"They have signed the contract. They ___ open a new branch.",a:"are going to",hint:"A decision already made",expl:"'Going to' for plans or decisions already made. are going to + V1."},
    {s:"He ___ study medicine. He's applied to three universities.",a:"is going to",hint:"A planned future action",expl:"'Going to' for pre-arranged plans. is going to + V1."},
    {s:"We ___ visit my grandparents this weekend.",a:"are going to",hint:"A family plan already arranged",expl:"'Going to' for plans made in advance. are going to + V1."},
    {s:"She ate too much — she ___ feel sick.",a:"is going to",hint:"A predictable consequence",expl:"'Going to' for predictions based on present evidence. is going to + V1."},
    {s:"I ___ learn how to cook Italian food this year.",a:"am going to",hint:"A personal resolution or goal",expl:"'Going to' for intentions and goals. am going to + V1."},
    {s:"The project deadline is Monday — we ___ work all weekend.",a:"are going to",hint:"A necessary plan based on the situation",expl:"'Going to' for plans resulting from current circumstances. are going to + V1."},
  ],
  fc:[
    {s:"This time next week, I ___ on a beach in Cancún.",a:"will be lying",hint:"Imagining yourself at a specific future moment",expl:"Future continuous for an action in progress at a specific future time. will be + V-ing."},
    {s:"Don't call at 8 pm — she ___ her favourite show.",a:"will be watching",hint:"A predictable ongoing activity at a future time",expl:"Future continuous for an activity expected to be in progress at a future moment."},
    {s:"By the time you arrive, they ___ dinner.",a:"will be having",hint:"The meal will be in progress when you get there",expl:"Future continuous shows an action will be ongoing at a future reference point."},
    {s:"He ___ in the Tokyo office next year.",a:"will be working",hint:"A future ongoing arrangement",expl:"Future continuous for planned ongoing situations. will be + working."},
    {s:"This time tomorrow, we ___ to New York.",a:"will be flying",hint:"In-flight at that exact future moment",expl:"will be + flying shows the action will be in progress at a specific future time."},
    {s:"At midnight, the team ___ the final results.",a:"will be announcing",hint:"A scheduled ongoing action at a future time",expl:"Future continuous for a planned action in progress at a specific future moment."},
    {s:"She ___ the presentation when the CEO walks in.",a:"will be giving",hint:"The presentation will already be in progress",expl:"Future continuous shows an ongoing action at the moment another future event occurs."},
    {s:"Don't worry, we ___ for you when you land.",a:"will be waiting",hint:"An action ongoing at a future moment",expl:"will be + waiting shows the waiting will be in progress when you arrive."},
    {s:"The students ___ their exams this time next month.",a:"will be taking",hint:"Exams in progress at a specific future time",expl:"Future continuous for an action expected to be in progress at a future time."},
    {s:"I ___ about you every day while you're away.",a:"will be thinking",hint:"An ongoing future state",expl:"will be + thinking describes an ongoing action during a future period."},
  ],
  fp:[
    {s:"By the time you wake up, I ___ the whole house.",a:"will have cleaned",hint:"Completed before a future moment",expl:"Future perfect for an action completed before a future reference point. will have + V3."},
    {s:"She ___ her degree by June.",a:"will have finished",hint:"Graduation before a future month",expl:"'By June' is the future deadline. will have + finished."},
    {s:"By 2030, scientists ___ a cure for that disease.",a:"will have found",hint:"A future achievement before a set year",expl:"Future perfect for completion before a future point in time. will have + found."},
    {s:"He ___ 1,000 hours of flight time by next year.",a:"will have logged",hint:"A total achieved before a future moment",expl:"Future perfect for accumulated achievements by a future deadline. will have + logged."},
    {s:"By the time the movie starts, we ___ all the popcorn.",a:"will have eaten",hint:"Gone before the film begins",expl:"will have + eaten shows completion before the future reference point."},
    {s:"I ___ this book by Friday, I promise.",a:"will have read",hint:"A commitment to finish before a deadline",expl:"Future perfect expresses completion before a stated future moment. will have + read."},
    {s:"They ___ the new bridge by the end of the year.",a:"will have built",hint:"Construction complete before year-end",expl:"'By the end of the year' is the future deadline. will have + built."},
    {s:"By the time she retires, she ___ for 40 years.",a:"will have worked",hint:"A total duration completed at a future point",expl:"Future perfect for duration completed by a future moment. will have + worked."},
    {s:"___ you ___ the report before the meeting?",a:"Will / have written",hint:"Asking if it will be done before a future event",expl:"Question form: Will + subject + have + V3?"},
    {s:"By next month, they ___ in their new house for a year.",a:"will have been living",hint:"A duration reached at a future point",expl:"Future perfect continuous for duration completed at a future moment. will have been + living."},
  ],
};

let sel=null,correct=0,wrong=0,total=0;
let pool=[],used=[],qCount=0,answered=false;
const allTenses=[];

// Build UI
const groupsEl=document.getElementById("groups");
let n=1;
GROUPS.forEach(g=>{
  const gDiv=document.createElement("div");
  const lbl=document.createElement("div");
  lbl.className="group-label";lbl.textContent=g.label;
  gDiv.appendChild(lbl);
  const grid=document.createElement("div");
  grid.className="tense-grid";
  g.tenses.forEach(t=>{
    allTenses.push(t);
    const btn=document.createElement("button");
    btn.className="tense-btn";btn.dataset.id=t.id;
    btn.innerHTML=`<span class="tn">${String(n).padStart(2,"0")}</span>${t.label}`;
    btn.onclick=()=>pick(t);
    grid.appendChild(btn);n++;
  });
  gDiv.appendChild(grid);
  groupsEl.appendChild(gDiv);
});

function randomTense(){pick(allTenses[Math.floor(Math.random()*allTenses.length)]);}

function pick(t){
  sel=t;
  document.querySelectorAll(".tense-btn").forEach(b=>b.classList.toggle("active",b.dataset.id===t.id));
  pool=[...Q[t.id]];used=[];qCount=0;nextQ();
}

function nextQ(){
  if(!pool.length){pool=[...used];used=[];}
  const i=Math.floor(Math.random()*pool.length);
  const q=pool.splice(i,1)[0];
  used.push(q);qCount++;answered=false;renderQ(q);
}

function renderQ(q){
  const area=document.getElementById("quiz-area");
  const parts=q.s.split("___");
  const sent=parts[0]+'<span class="blank-word">______</span>'+(parts[1]||"");
  document.getElementById("prog").style.width=Math.min(100,Math.round(qCount/Q[sel.id].length*100))+"%";
  area.innerHTML=`
    <div class="quiz-card">
      <div class="card-top">
        <span class="tense-badge">${sel.label}</span>
        <span class="q-counter">Question ${qCount}</span>
      </div>
      <div class="structure-box">${sel.structure}</div>
      <div class="question-text">${sent}</div>
      <div class="hint">💡 ${q.hint}</div>
      <div class="input-row">
        <input class="ans-input" id="ans" placeholder="Type the missing verb form..." autocomplete="off" spellcheck="false"/>
        <button class="check-btn" id="cbtn" onclick="check()">Check</button>
      </div>
      <div id="fb"></div>
    </div>
    <button class="next-btn" id="nbtn" onclick="nextQ()">Next question →</button>`;
  area._q=q;
  const inp=document.getElementById("ans");
  inp.focus();
  inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&!answered)check();});
}

function norm(s){return s.trim().toLowerCase().replace(/\s+/g," ");}

function check(){
  if(answered)return;
  const area=document.getElementById("quiz-area");
  const q=area._q;
  const inp=document.getElementById("ans");
  const val=inp.value.trim();
  if(!val){inp.focus();return;}
  answered=true;inp.disabled=true;document.getElementById("cbtn").disabled=true;
  const u=norm(val),c=norm(q.a);
  const ok=u===c||u.replace(/'/g,"")===c.replace(/'/g,"")||u===c.replace("n't"," not")||c===u.replace("n't"," not");
  total++;if(ok)correct++;else wrong++;
  updateScore();
  const fb=document.getElementById("fb");
  if(ok){
    fb.innerHTML=`<div class="feedback correct">✓ Correct! Well done.<div class="expl">${q.expl}</div></div>`;
  }else{
    fb.innerHTML=`<div class="feedback wrong">✗ Not quite. Correct answer: <span class="correct-ans">${q.a}</span><div class="expl">${q.expl}</div></div>`;
  }
  document.getElementById("nbtn").style.display="block";
}

function updateScore(){
  document.getElementById("s-correct").textContent="✓ "+correct;
  document.getElementById("s-wrong").textContent="✗ "+wrong;
  document.getElementById("s-pct").textContent=total?Math.round(correct/total*100)+" %":"— %";
}
</script>
</body>
