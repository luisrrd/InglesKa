<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>English Tenses Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#F7F5F0;--surface:#FFF;--s2:#F0EDE6;--text:#1A1814;--t2:#6B6558;--t3:#9E9891;--blue:#1B4F8A;--blu:#E8F0FB;--blum:#3A7BD5;--green:#2D6A4F;--gl:#D8F3DC;--red:#9B2226;--rl:#FFE8E8;--gold:#B5881C;--gol:#FEF7E0;--bo:rgba(0,0,0,.08);--bo2:rgba(0,0,0,.14);--r:12px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--bo);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Lora',serif;font-size:18px;font-weight:600;}
.logo span{color:var(--blum);}
.pills{display:flex;gap:8px;}
.pill{padding:4px 12px;border-radius:99px;font-size:13px;font-weight:500;border:1px solid var(--bo2);background:var(--surface);}
.pill.c{background:var(--gl);color:var(--green);border-color:#74C69D;}
.pill.w{background:var(--rl);color:var(--red);border-color:#F4A7A9;}
.pill.p{background:var(--gol);color:var(--gold);border-color:#F0C040;}
.main{max-width:720px;margin:0 auto;padding:2rem 1.25rem 4rem;}
.groups{display:flex;flex-direction:column;gap:1.25rem;margin-bottom:1.5rem;}
.glabel{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;padding-left:2px;}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;}
.tbtn{padding:9px 12px;border:1px solid var(--bo2);border-radius:var(--rs);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:left;line-height:1.4;}
.tbtn:hover{background:var(--s2);}
.tbtn.active{background:var(--blu);border:2px solid var(--blum);color:var(--blue);}
.tbtn .tn{display:block;font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--t3);margin-bottom:2px;}
.tbtn.active .tn{color:var(--blum);}
.rnd{padding:9px;border:1.5px dashed var(--bo2);border-radius:var(--rs);background:transparent;color:var(--t2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;width:100%;margin-bottom:1.25rem;transition:background .15s;}
.rnd:hover{background:var(--s2);}
.pbar{height:3px;background:var(--bo);border-radius:99px;margin-bottom:1.25rem;overflow:hidden;}
.pfill{height:100%;background:var(--blum);border-radius:99px;transition:width .4s;}
.card{background:var(--surface);border:1px solid var(--bo);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem;}
.ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;}
.badge{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);background:var(--blu);border-radius:99px;padding:4px 12px;}
.qn{font-size:13px;color:var(--t3);}
.sbox{font-family:'Courier New',monospace;font-size:12px;color:var(--t2);background:var(--s2);border-radius:var(--rs);padding:6px 11px;margin-bottom:1.1rem;}
.qtext{font-family:'Lora',serif;font-size:19px;line-height:1.65;margin-bottom:.4rem;}
.blank{display:inline-block;min-width:80px;border-bottom:2.5px solid var(--blum);padding:0 4px;color:transparent;vertical-align:bottom;}
.vref{font-size:13px;color:var(--t3);margin-bottom:1.1rem;font-style:italic;}
.vref strong{font-style:normal;color:var(--t2);font-weight:500;}
.irow{display:flex;gap:8px;}
.ainp{flex:1;padding:9px 13px;border:1px solid var(--bo2);border-radius:var(--rs);font-size:15px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:border .15s,box-shadow .15s;}
.ainp:focus{outline:none;border-color:var(--blum);box-shadow:0 0 0 3px rgba(58,123,213,.15);}
.ainp:disabled{opacity:.6;}
.ckbtn{padding:9px 20px;border:none;border-radius:var(--rs);background:var(--blue);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap;}
.ckbtn:hover{background:var(--blum);}
.ckbtn:active{transform:scale(.97);}
.ckbtn:disabled{opacity:.4;cursor:default;}
.fb{margin-top:12px;padding:11px 14px;border-radius:var(--rs);font-size:14px;line-height:1.65;animation:fin .2s ease;}
.fb.ok{background:var(--gl);color:var(--green);border:1px solid #74C69D;}
.fb.no{background:var(--rl);color:var(--red);border:1px solid #F4A7A9;}
.cans{font-weight:600;font-family:'Lora',serif;}
.expl{margin-top:5px;font-size:13px;opacity:.85;}
@keyframes fin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.nxtbtn{width:100%;padding:10px;border:1px solid var(--bo2);border-radius:var(--rs);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;display:none;}
.nxtbtn:hover{background:var(--s2);}
.hint0{text-align:center;padding:3rem 0;color:var(--t3);font-size:15px;}
.hint0 .ar{font-size:22px;display:block;margin-bottom:8px;}
@media(max-width:520px){.topbar{padding:0 1rem;}.tgrid{grid-template-columns:1fr 1fr;}.qtext{font-size:16px;}.pill.p{display:none;}}
</style>
</head>

const GROUPS = [
  { label:'Present tenses', ids:['sp','pc','pp','ppc'] },
  { label:'Past tenses',    ids:['past','pac','pap','papc'] },
  { label:'Future tenses',  ids:['fw','fg','fc','fp'] },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let sel=null, correct=0, wrong=0, total=0;
let vpool=[], vused=[], tpool=[], tused=[], qCount=0, answered=false;

// ── BUILD UI ──────────────────────────────────────────────────────────────────
const grpsEl=document.getElementById('groups');
let n=1;
GROUPS.forEach(g=>{
  const gd=document.createElement('div');
  const lb=document.createElement('div'); lb.className='glabel'; lb.textContent=g.label;
  gd.appendChild(lb);
  const grid=document.createElement('div'); grid.className='tgrid';
  g.ids.forEach(id=>{
    const t=TENSES.find(x=>x.id===id);
    const btn=document.createElement('button');
    btn.className='tbtn'; btn.dataset.id=id;
    btn.innerHTML=`<span class="tn">${String(n).padStart(2,'0')}</span>${t.label}`;
    btn.onclick=()=>pick(t);
    grid.appendChild(btn); n++;
  });
  gd.appendChild(grid); grpsEl.appendChild(gd);
});

function rndTense(){ pick(TENSES[Math.floor(Math.random()*TENSES.length)]); }

function pick(t){
  sel=t;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('active',b.dataset.id===t.id));
  vpool=[...VERBS]; vused=[];
  tpool=[...t.templates]; tused=[];
  qCount=0; nextQ();
}

function pickRand(arr){ return arr.splice(Math.floor(Math.random()*arr.length),1)[0]; }

function nextQ(){
  if(!vpool.length){ vpool=[...vused]; vused=[]; }
  if(!tpool.length){ tpool=[...sel.templates]; tused=[]; }
  const v=pickRand(vpool); vused.push(v);
  const tmpl=pickRand(tpool); tused.push(tmpl);
  qCount++; answered=false;
  renderQ(v, tmpl);
}

function renderQ(v, tmpl){
  const area=document.getElementById('qa');
  // Compute answer - handle special case for "it is going to rain" template
  let ans;
  try { ans = (typeof tmpl.ans==='function') ? tmpl.ans(v) : tmpl.ans; }
  catch(e){ ans = '—'; }
  // Compute explanation
  let expl;
  try { expl = (typeof tmpl.expl==='function') ? tmpl.expl(v) : tmpl.expl; }
  catch(e){ expl = ''; }

  // Build sentence: replace ___ with blank, {sp} with Spanish
  let sent = tmpl.s.replace('{sp}', v.spanish);
  // Handle split blanks like "have / participle"
  if(ans.includes(' / ')){
    const parts = sent.split('___');
    sent = parts[0]+'<span class="blank">____</span>'+parts[1].replace('___','<span class="blank">____</span>')+(parts[2]||'');
  } else {
    sent = sent.replace('___','<span class="blank">________</span>');
  }

  // Progress
  const prog=Math.min(100,Math.round(qCount/VERBS.length*100));
  document.getElementById('prog').style.width=prog+'%';

  area.innerHTML=`
    <div class="card">
      <div class="ctop">
        <span class="badge">${sel.label}</span>
        <span class="qn">Question ${qCount}</span>
      </div>
      <div class="sbox">${sel.structure}</div>
      <div class="qtext">${sent}</div>
      <div class="vref">Verb: <strong>${v.base}</strong> → ${v.past} → ${v.participle} &nbsp;|&nbsp; ${v.spanish}</div>
      <div class="irow">
        <input class="ainp" id="ans" placeholder="Type the complete verb form…" autocomplete="off" spellcheck="false"/>
        <button class="ckbtn" id="cbtn" onclick="doCheck()">Check</button>
      </div>
      <div id="fb"></div>
    </div>
    <button class="nxtbtn" id="nbtn" onclick="nextQ()">Next question →</button>`;
  area._v=v; area._tmpl=tmpl; area._ans=ans; area._expl=expl;
  const inp=document.getElementById('ans');
  inp.focus();
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!answered) doCheck(); });
}

function norm(s){ return s.trim().toLowerCase().replace(/\s+/g,' '); }

function doCheck(){
  if(answered) return;
  const area=document.getElementById('qa');
  const ans=area._ans; const expl=area._expl;
  const inp=document.getElementById('ans');
  const val=inp.value.trim(); if(!val){ inp.focus(); return; }
  answered=true; inp.disabled=true; document.getElementById('cbtn').disabled=true;

  const u=norm(val), c=norm(ans);
  // Also accept answers without slash for split answers
  const cAlt=c.replace(' / ',' ');
  const ok = u===c || u===cAlt
    || u.replace(/'/g,'')===c.replace(/'/g,'')
    || u===c.replace("n't",' not')
    || c===u.replace("n't",' not');

  total++; if(ok) correct++; else wrong++;
  updateScore();

  const fb=document.getElementById('fb');
  if(ok){
    fb.innerHTML=`<div class="fb ok">✓ Correct! Well done.<div class="expl">${expl}</div></div>`;
  } else {
    fb.innerHTML=`<div class="fb no">✗ Not quite. Correct: <span class="cans">${ans}</span><div class="expl">${expl}</div></div>`;
  }
  document.getElementById('nbtn').style.display='block';
}

function updateScore(){
  document.getElementById('sc').textContent='✓ '+correct;
  document.getElementById('sw').textContent='✗ '+wrong;
  document.getElementById('sp2').textContent=total?Math.round(correct/total*100)+' %':'— %';
}
</script>
</body>
</html>
